substitutions:
  _SERVICE: freshify-workspaces-fe
  _REGION: us-central1
  _REPO: us-central1-docker.pkg.dev/freshify-prod/freshify

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REPO}/${_SERVICE}:$SHORT_SHA
      - -t
      - ${_REPO}/${_SERVICE}:latest
      - .
  - id: push-sha
    name: gcr.io/cloud-builders/docker
    args: [push, "${_REPO}/${_SERVICE}:$SHORT_SHA"]
  - id: push-latest
    name: gcr.io/cloud-builders/docker
    args: [push, "${_REPO}/${_SERVICE}:latest"]
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REPO}/${_SERVICE}:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=4
      - --set-env-vars=NODE_ENV=production,WORKSPACES_SERVICE_URL=https://freshify-workspaces-sbzaekoo4q-uc.a.run.app,SESSION_COOKIE_NAME=sp_session

images:
  - ${_REPO}/${_SERVICE}:$SHORT_SHA
  - ${_REPO}/${_SERVICE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
